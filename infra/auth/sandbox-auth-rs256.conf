# Sotto — Canton sandbox with ASYMMETRIC JWT auth (RS256 + JWKS).
#
# This is the production-SHAPE auth node. Unlike sandbox-auth.conf (which shares
# an HS256 secret with the backend), here the node holds NO secret: it validates
# every token's signature against a public key it fetches from a JWKS endpoint.
# That endpoint is whoever mints the tokens — in dev, the Sotto backend running
# with AUTH_MODE=rs256 (it publishes /.well-known/jwks.json on boot). In real
# production you delete this `url` line's host and point it at your IdP's JWKS
# (Auth0/Keycloak/Cognito) — nothing else changes.
#
# Run both together:
#   1) AUTH_MODE=rs256 npm --prefix backend start      # publishes the JWKS first
#   2) dpm sandbox -c infra/auth/sandbox-auth-rs256.conf --no-tty
# The backend must be reachable when the node validates a token; the node caches
# the JWKS and re-fetches on a signature miss, so a backend restart self-heals.
#
# Same +1000 ports as the HMAC node, so swap configs without touching the backend.

canton {
  participants.sandbox {
    admin-api.port = 7866
    http-ledger-api.port = 7864
    ledger-api {
      port = 7865
      auth-services = [
        {
          # Canton 3.5.1 names this auth-service `JwtJwks` → kebab-case jwt-jwks
          # (it validates RS256/ES256 by reading the alg+key from the JWKS itself).
          type = jwt-jwks
          # The JWKS published by the token minter. Dev: the Sotto backend.
          # Prod: your IdP's JWKS url (e.g. https://YOUR.auth0.com/.well-known/jwks.json).
          url = "http://localhost:8080/.well-known/jwks.json"
          # A token's `aud` must equal this (audience-based; scope is deprecated).
          target-audience = "https://sotto.dev/ledger-api"
          # NB: jwt-jwks has no per-service max-token-life key (unlike unsafe-hmac);
          # lifetime is governed globally. Our dev tokens are 50m to stay under any
          # default cap (AUTH_TOKEN_TTL below).
        }
      ]
    }
  }
  mediators.mediator1.admin-api.port = 7869
  sequencers.sequencer1 {
    admin-api.port = 7868
    public-api.port = 7867
  }
}
