# Sotto — Canton sandbox with JWT auth ENABLED (dev/unsafe HMAC256).
#
# This is the Phase-1 trust-boundary node: unlike the open-auth demo sandbox,
# the Ledger API here REQUIRES a bearer token, and a token can only act/read as
# the parties its user has been granted (Canton user-management rights). That is
# what turns Sotto's privacy from "demonstrated" into "enforced by the ledger."
#
# Runs on +1000 ports so it can run alongside the open demo sandbox without
# colliding. Merges over Canton's built-in `sandbox` default config.
#
#   dpm sandbox -c infra/auth/sandbox-auth.conf --no-tty
#
# Canton 3.5.1 uses Standard JWT tokens (sub = user id + scope `daml_ledger_api`),
# NOT the legacy actAs/readAs custom-claims format. Authorization comes from the
# user's rights, so every identity must be a user created via user management.

canton {
  participants.sandbox {
    admin-api.port = 7866
    http-ledger-api.port = 7864
    ledger-api {
      port = 7865
      auth-services = [
        {
          type = unsafe-jwt-hmac-256
          # Dev only. In production this becomes jwt-rs-256-jwks pointing at the
          # IdP's JWKS endpoint (Auth0/Keycloak/Cognito) — no shared secret.
          secret = "sotto-dev-hs256-secret-change-me-please-0123456789"
          # Audience-based tokens (scope-based are deprecated in 3.5, gone in 3.7).
          # A token's `aud` must equal this value.
          target-audience = "https://sotto.dev/ledger-api"
          # Canton 3.5 caps token lifetime (default < 1h). Raise it for dev so
          # minted tokens aren't rejected as "too long". Prod tokens are short.
          max-token-life = 86400s
        }
      ]
    }
  }
  mediators.mediator1.admin-api.port = 7869
  sequencers.sequencer1 {
    admin-api.port = 7868
    public-api.port = 7867
  }
}
